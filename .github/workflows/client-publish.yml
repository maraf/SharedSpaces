name: Client Publish

on:
  push:
    tags:
      - 'client-*'

permissions:
  contents: write

jobs:
  publish-release:
    name: Build & Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/SharedSpaces.Client
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#client-}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/SharedSpaces.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base ./
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.value }}

      - name: Zip dist
        run: cd dist && zip -r ../sharedspaces-client-${{ steps.version.outputs.value }}.zip .

      - name: Upload to release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              sharedspaces-client-${{ steps.version.outputs.value }}.zip \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              sharedspaces-client-${{ steps.version.outputs.value }}.zip \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

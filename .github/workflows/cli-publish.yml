name: CLI Publish

on:
  push:
    tags:
      - 'cli-*'

permissions:
  contents: write
  id-token: write  # Required for OIDC trusted publishing to NuGet.org

jobs:
  publish-release:
    name: Pack & Release
    runs-on: ubuntu-latest
    environment: nuget.org  # Maps to trusted publisher config on nuget.org
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#cli-}" >> "$GITHUB_OUTPUT"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: >
          dotnet pack src/SharedSpaces.Cli/SharedSpaces.Cli.csproj
          --configuration Release
          -p:VersionPrefix=${{ steps.version.outputs.value }}
          --output ./artifacts

      - name: Upload to release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              ./artifacts/*.nupkg \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              ./artifacts/*.nupkg \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NuGet.org trusted publishing setup (one-time, manual):
      # 1. Go to https://www.nuget.org → Trusted Publishing → Add policy
      # 2. Repository: maraf/SharedSpaces, workflow: cli-publish.yml, environment: nuget.org
      # 3. Set repo variable NUGET_USER to your nuget.org username (Settings → Variables → Actions)
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

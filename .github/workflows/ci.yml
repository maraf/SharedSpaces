name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  server:
    name: Server (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SharedSpaces.sln

      - name: Build solution
        run: dotnet build SharedSpaces.sln --no-restore

      - name: Run tests
        run: dotnet test SharedSpaces.sln --no-build --verbosity normal

  client:
    name: Client (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/SharedSpaces.Client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/SharedSpaces.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SharedSpaces.sln

      - name: Build solution
        run: dotnet build SharedSpaces.sln --no-restore

      - name: Run tests
        run: dotnet test SharedSpaces.sln --no-build --verbosity normal
